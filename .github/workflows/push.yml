on: [push, pull_request]

name: CI

jobs:
  test:
    strategy:
      matrix:
        go: ['1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test -v -race ./...

